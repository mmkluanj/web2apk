name: Web2APK Pro Compiler Engine

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target Injected URL Website'
        required: false
        default: ''
      app_name:
        description: 'Application Launcher Name'
        required: true
        default: 'Web2APK_App'
      package_name:
        description: 'Android Package Name (com.example.app)'
        required: true
        default: 'com.web2apk.app'
      user_id:
        description: 'Telegram User ID Metrics Tracker'
        required: true
      zip_url:
        description: 'Download URL for Flutter Source Code ZIP'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Checkout Repository Codes
        uses: actions/checkout@v4

      - name: ☕ Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 💙 Setup Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: 📦 Download and Extract Custom Project Source (ZIP Mode)
        if: ${{ github.event.inputs.zip_url != '' }}
        run: |
          echo "📥 Downloading source code archive from Telegram cloud binary stream..."
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          echo "📂 Extracting project archive payload..."
          unzip -o project.zip -d ./custom_project
          # Sinkronisasi direktori root jika zip dibungkus folder internal
          if [ -f "./custom_project/pubspec.yaml" ]; then
            cp -r ./custom_project/* .
          else
            cp -r ./custom_project/*/* . 2>/dev/null || true
          fi

      - name: 🛠️ Inject App Configuration Metadata
        run: |
          echo "⚙️ Re-branding strings identifier to: ${{ github.event.inputs.app_name }}"
          # Langkah penggantian nama aplikasi & package name otomatis bisa disesuaikan di sini jika diperlukan

      - name: 🔄 Resolve Project Dependencies
        run: |
          flutter pub upgrade
          flutter pub get

      - name: 🏗️ Compile Production Release APK Architecture
        run: |
          flutter build apk --release

      - name: 📤 Upload Compiled Artifact Output
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1
