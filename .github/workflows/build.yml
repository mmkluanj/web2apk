name: Build APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (kosongkan jika pakai ZIP)'
        required: false
        default: ''
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'MyApp'
      package_name:
        description: 'Package Name (com.example.app)'
        required: true
        default: 'com.example.app'
      user_id:
        description: 'User ID Telegram'
        required: true
        default: '0'
      zip_url:
        description: 'URL ZIP (untuk Flutter project)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ============ SETUP ENVIRONMENT ============
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      # ============ DOWNLOAD PROJECT ============
      - name: Download Project
        run: |
          mkdir -p project
          cd project
          
          if [ -n "${{ inputs.zip_url }}" ]; then
            echo "📦 Downloading from ZIP: ${{ inputs.zip_url }}"
            wget -q "${{ inputs.zip_url }}" -O project.zip
            unzip -q project.zip
            rm project.zip
            echo "✅ ZIP extracted!"
          else
            echo "🌐 Using URL: ${{ inputs.url }}"
            # Buat project Flutter kosong jika tidak ada URL
            if [ -z "${{ inputs.url }}" ]; then
              echo "⚠️ No URL provided, creating empty Flutter project..."
              flutter create --org com.web2apk .
            else
              # Coba clone URL (jika repo git)
              git clone "${{ inputs.url }}" ./ || echo "Not a git repo, using direct download"
            fi
          fi
          
          ls -la
      
      # ============ BUILD APK ============
      - name: Build APK
        run: |
          cd project
          
          if [ -f "pubspec.yaml" ]; then
            echo "📱 Flutter project detected!"
            flutter pub get
            flutter build apk --release
            echo "✅ Build complete!"
          else
            echo "📱 Using PWA2APK for website..."
            npm install -g pwa2apk
            pwa2apk --url "${{ inputs.url }}" \
                    --name "${{ inputs.app_name }}" \
                    --package "${{ inputs.package_name }}"
          fi
          
          # Cari file APK
          echo "📁 Looking for APK files..."
          find . -name "*.apk" -exec ls -lh {} \;
      
      # ============ UPLOAD ARTIFACT ============
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ${{ inputs.app_name }}
          path: |
            project/build/app/outputs/flutter-apk/*.apk
            project/*.apk
            project/build/app/outputs/apk/release/*.apk
